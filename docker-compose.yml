version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
      POSTGRES_DB: billing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://billing:billing@db:5432/billing
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/code

  worker:
    build: ./backend
    command: python -m app.worker
    restart: always
    environment:
      DATABASE_URL: postgresql://billing:billing@db:5432/billing
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/code

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata: